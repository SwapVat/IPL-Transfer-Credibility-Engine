version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: ipl_credibility_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"] # Optional: Enable APOC if needed in the future

volumes:
  neo4j_data:
  neo4j_logs:
